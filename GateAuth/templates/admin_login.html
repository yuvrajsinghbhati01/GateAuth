
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container container-tight">
        <div class="card p-4 shadow">
            <div class="text-center mb-4">
                <h3 class="text-capitalize">{{ role }} Login</h3>
                <p class="text-muted">Enter your credentials to access the portal</p>
            </div>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" name="email" type="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button class="btn btn-primary w-100 py-2">Sign In</button>
            </form>
            <a href="/" class="btn btn-link w-100 mt-3 text-decoration-none">Back</a>
        </div>
    </div>
</body>
</html>
