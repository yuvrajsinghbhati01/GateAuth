<!DOCTYPE html>
<html>
<head>
    <title>Hostel Gate Pass System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏫 Hostel Gate Pass System</a>
        </div>
    </nav> -->

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold">GateAuth </h1>
            <p class="lead text-muted">The Hostel Pass Management Portal</p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-md-3">
                <div class="card h-100 p-4 text-center card-hover">
                    <div class="fs-1 mb-2">🎓</div>
                    <h5>Student</h5>
                    <p class="text-muted small">Apply for passes and track status.</p>
                    <a href="/login/student" class="btn btn-primary mt-auto w-100">Login</a>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 p-4 text-center card-hover">
                    <div class="fs-1 mb-2">👨‍👩‍👧</div>
                    <h5>Parent</h5>
                    <p class="text-muted small">Approve your child's out-pass.</p>
                    <a href="/login/parent" class="btn btn-success mt-auto w-100">Login</a>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 p-4 text-center card-hover">
                    <div class="fs-1 mb-2">🔑</div>
                    <h5>Warden</h5>
                    <p class="text-muted small">Review and grant final permissions.</p>
                    <a href="/login/warden" class="btn btn-warning mt-auto w-100 text-white">Login</a>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 p-4 text-center card-hover">
                    <div class="fs-1 mb-2">🛡️</div>
                    <h5>Admin</h5>
                    <p class="text-muted small">System logs and management.</p>
                    <a href="/login/admin" class="btn btn-dark mt-auto w-100">Login</a>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <p>New user? <a href="/register" class="text-decoration-none fw-bold">Create an account</a></p>
        </div>
    </div>
</body>
</html>
